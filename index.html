<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Sukara Restaurante</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --gold-primary: #C9A962;
            --gold-light: #E8D5A3;
            --gold-dark: #9A7B3D;
            --black: #0A0A0A;
            --black-light: #141414;
            --black-lighter: #1E1E1E;
            --white: #FFFFFF;
            --white-muted: rgba(255, 255, 255, 0.7);
            --white-subtle: rgba(255, 255, 255, 0.1);
            --danger: #ff6b6b;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--black) 0%, var(--black-light) 100%);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-box {
            background: var(--black-lighter);
            padding: 50px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--white-subtle);
        }
        
        .login-box img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 20px;
        }
        
        .login-box h2 {
            font-family: 'Playfair Display', serif;
            color: var(--gold-primary);
            margin-bottom: 10px;
        }
        
        .login-box p {
            color: var(--white-muted);
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--white-muted);
            font-size: 0.9rem;
        }
        
        .form-group input {
            width: 100%;
            padding: 15px;
            background: var(--black);
            border: 1px solid var(--white-subtle);
            border-radius: 10px;
            color: var(--white);
            font-size: 1rem;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--gold-primary);
        }
        
        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--gold-primary);
            color: var(--black);
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-login:hover {
            background: var(--gold-light);
        }
        
        .error-message {
            color: var(--danger);
            margin-top: 15px;
            display: none;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--white-muted);
            text-decoration: none;
        }
        
        .back-link:hover {
            color: var(--gold-primary);
        }
        
        @media (max-width: 480px) {
            .login-box {
                padding: 30px 20px;
                margin: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="../assets/images/logo.jpg" alt="Sukara Logo">
        <h2>Painel Administrativo</h2>
        <p>Faça login para gerenciar o site</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Utilizador</label>
                <input type="text" id="username" placeholder="admin" required>
            </div>
            <div class="form-group">
                <label for="password">Palavra-passe</label>
                <input type="password" id="password" placeholder="••••••" required>
            </div>
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt"></i> Entrar
            </button>
        </form>
        
        <p class="error-message" id="errorMessage">
            <i class="fas fa-exclamation-circle"></i> Credenciais inválidas
        </p>
        
        <a href="../index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Voltar ao site
        </a>
    </div>
    
    <script>
        // Admin credentials
        const ADMIN_USER = 'admin';
        const ADMIN_PASS = 'sukara2024';
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username === ADMIN_USER && password === ADMIN_PASS) {
                localStorage.setItem('sukaraAdminLoggedIn', 'true');
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('errorMessage').style.display = 'block';
            }
        });
    </script>
</body>
</html>
