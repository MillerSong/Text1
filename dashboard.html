<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Sukara Restaurante</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --gold-primary: #C9A962;
            --gold-light: #E8D5A3;
            --gold-dark: #9A7B3D;
            --black: #0A0A0A;
            --black-light: #141414;
            --black-lighter: #1E1E1E;
            --white: #FFFFFF;
            --white-muted: rgba(255, 255, 255, 0.7);
            --white-subtle: rgba(255, 255, 255, 0.1);
            --success: #25D366;
            --danger: #ff6b6b;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
        }
        
        .admin-header {
            background: var(--black-lighter);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--white-subtle);
        }
        
        .admin-logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .admin-logo img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
        
        .admin-logo h3 {
            font-family: 'Playfair Display', serif;
            color: var(--gold-primary);
        }
        
        .admin-nav {
            display: flex;
            gap: 10px;
        }
        
        .admin-nav button {
            background: transparent;
            border: 1px solid var(--white-subtle);
            color: var(--white);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .admin-nav button:hover,
        .admin-nav button.active {
            background: var(--gold-primary);
            color: var(--black);
            border-color: var(--gold-primary);
        }
        
        .btn-logout {
            background: var(--danger) !important;
            color: var(--white) !important;
            border-color: var(--danger) !important;
        }
        
        .admin-content {
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin-bottom: 25px;
            color: var(--gold-primary);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--black-lighter);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid var(--white-subtle);
        }
        
        .stat-card i {
            font-size: 2rem;
            color: var(--gold-primary);
            margin-bottom: 15px;
        }
        
        .stat-card h4 {
            color: var(--white-muted);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        
        .stat-card p {
            font-size: 1.8rem;
            font-weight: 600;
        }
        
        .menu-editor {
            background: var(--black-lighter);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid var(--white-subtle);
        }
        
        .category-section {
            margin-bottom: 30px;
        }
        
        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--white-subtle);
        }
        
        .category-header h4 {
            color: var(--gold-primary);
            font-size: 1.2rem;
        }
        
        .btn-add {
            background: var(--success);
            color: var(--white);
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        
        .items-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .items-table th,
        .items-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--white-subtle);
        }
        
        .items-table th {
            color: var(--white-muted);
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
        }
        
        .items-table input {
            background: var(--black);
            border: 1px solid var(--white-subtle);
            color: var(--white);
            padding: 8px 12px;
            border-radius: 5px;
            width: 100%;
        }
        
        .items-table input:focus {
            outline: none;
            border-color: var(--gold-primary);
        }
        
        .btn-save {
            background: var(--gold-primary);
            color: var(--black);
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .btn-delete {
            background: var(--danger);
            color: var(--white);
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .btn-save-all {
            background: var(--gold-primary);
            color: var(--black);
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 20px;
        }
        
        .info-editor {
            background: var(--black-lighter);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid var(--white-subtle);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--white-muted);
            font-size: 0.9rem;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            background: var(--black);
            border: 1px solid var(--white-subtle);
            border-radius: 8px;
            color: var(--white);
            font-size: 1rem;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--gold-primary);
        }
        
        .hidden {
            display: none !important;
        }
        
        @media (max-width: 1024px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .form-row {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 768px) {
            .admin-header {
                flex-direction: column;
                gap: 15px;
                padding: 15px;
            }
            .admin-nav {
                flex-wrap: wrap;
                justify-content: center;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .items-table {
                font-size: 0.85rem;
            }
            .items-table th,
            .items-table td {
                padding: 8px;
            }
        }
    </style>
</head>

        </nav>
    </header>
    
    <main class="admin-content">

            <div class="stats-grid">

                </div>

                    <h4>Categorias</h4>
                    <p id="totalCategories">0</p>
                </div>
                <div class="stat-card">

                    <h4>Populares</h4>
                    <p id="popularItems">0</p>
                </div>
                <div class="stat-card">
                    <i class="fas fa-dollar-sign"></i>
                    <h4>Preço Médio</h4>
                    <p id="avgPrice">0 Kz</p>
                </div>
            </div>
            
            <div class="menu-editor">
                <div id="menuCategories"></div>
                <button class="btn-save-all" onclick="saveAllChanges()">
                    <i class="fas fa-save"></i> Guardar Todas as Alterações
                </button>
            </div>
        </div>
        
        <!-- Info Tab -->
        <div id="infoTab" class="tab-content hidden">
            <h2 class="section-title">Informações do Restaurante</h2>
            
            <div class="info-editor">
                <div class="form-row">
                    <div class="form-group">
                        <label>Nome do Restaurante</label>
                        <input type="text" id="restaurantName" value="Sukara">
                    </div>
                    <div class="form-group">
                        <label>Slogan</label>

                    </div>
                </div>
                
                <div class="form-group">
                    <label>Morada</label>
                    <input type="text" id="restaurantAddress" value="Avenida 21 de Janeiro, nº 31, Morro Bento, Luanda">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Telefone 1</label>
                        <input type="text" id="restaurantPhone1" value="+244 948 909 000">
                    </div>
                    <div class="form-group">
                        <label>Telefone 2</label>
                        <input type="text" id="restaurantPhone2" value="+244 947 717 172">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Horário de Abertura</label>
                        <input type="text" id="restaurantHours" value="07:30 - 22:00">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="text" id="restaurantEmail" value="info@sukara.com">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Instagram</label>
                        <input type="text" id="restaurantInstagram" value="@sukara">
                    </div>
                    <div class="form-group">
                        <label>Facebook</label>
                        <input type="text" id="restaurantFacebook" value="Sukara Restaurante">
                    </div>
                </div>
                
                <button class="btn-save-all" onclick="saveInfo()">
                    <i class="fas fa-save"></i> Guardar Informações
                </button>
            </div>
        </div>
    </main>

            ]},
            bebidas: { name: 'Bebidas Quentes', items: [
                { id: 'bq1', name: 'Chá Natural', description: 'Limão ou gengibre', price: 1500, image: '../assets/images/menu-bebidas.jpg' },
                { id: 'bq2', name: 'Chá (Pacote)', description: 'Chá de pacote', price: 1000, image: '../assets/images/menu-bebidas.jpg' },
                { id: 'bq3', name: 'Espresso', description: 'Café espresso', price: 1150, image: '../assets/images/menu-bebidas.jpg' },
                { id: 'bq4', name: 'Espresso Duplo', description: 'Dose dupla de espresso', price: 2800, image: '../assets/images/menu-bebidas.jpg' },
                { id: 'bq5', name: 'Espresso Descafeinado', description: 'Café sem cafeína', price: 1300, image: '../assets/images/menu-bebidas.jpg' },
                { id: 'bq6', name: 'Meia Leite', description: 'Café com leite', price: 1850, image: '../assets/images/menu-bebidas.jpg' },
                { id: 'bq7', name: 'Capuccino', description: 'Café capuccino', price: 2300, image: '../assets/images/menu-bebidas.jpg', popular: true },
                { id: 'bq8', name: 'Galão', description: 'Café galão', price: 2300, image: '../assets/images/menu-bebidas.jpg' }
            ]},
            refrigerantes: { name: 'Refrigerantes', items: [
                { id: 'r1', name: 'Gasosa (Lata 330ml)', description: 'Coca Cola, Coca Cola Zero, Fanta, Sprite, Sumol', price: 1100, image: '../assets/images/menu-bebidas.jpg' },
                { id: 'r2', name: 'Sumos (Pacote 220ml)', description: 'Gardenia', price: 700, image: '../assets/images/menu-bebidas.jpg' },
                { id: 'r3', name: 'Água Mineral (500ml)', description: 'Água pura', price: 600, image: '../assets/images/menu-bebidas.jpg' },
                { id: 'r4', name: 'Água Tónica (Lata 330ml)', description: 'Tónica', price: 1300, image: '../assets/images/menu-bebidas.jpg' },
                { id: 'r5', name: 'Red Bull (Lata 330ml)', description: 'Energético', price: 3300, image: '../assets/images/menu-bebidas.jpg' }
            ]},
            sumos: { name: 'Sumos Naturais', items: [
                { id: 'sn1', name: 'Detox Verde', description: 'Couve, gengibre, hortelã, coentro, maçã e ananás', price: 4850, image: '../assets/images/menu-bebidas.jpg', popular: true },
                { id: 'sn2', name: 'Laranja', description: 'Sumo de laranja natural', price: 3500, image: '../assets/images/menu-bebidas.jpg' }
            ]},
            pratos: { name: 'Pratos', items: [
                { id: 'pr1', name: 'Fajita de Frango no Prato', description: 'Acompanhado de arroz, salada de repolho e batatas fritas', price: 10000, image: '../assets/images/menu-pratos.jpg' },
                { id: 'pr2', name: 'Fajita de Carne no Prato', description: 'Acompanhado de arroz, salada de repolho e batatas fritas', price: 11000, image: '../assets/images/menu-pratos.jpg' },
                { id: 'pr3', name: 'Picanha no Prato', description: 'Acompanhado de arroz, feijão preto, salada de repolho e batatas fritas', price: 12000, image: '../assets/images/menu-pratos.jpg', popular: true },
                { id: 'pr4', name: 'Crispy Strips (9 pedaços)', description: 'Tiras de frango panado acompanhado de batatas fritas e salada de repolho', price: 8500, image: '../assets/images/menu-pratos.jpg' },
                { id: 'pr5', name: 'Chicken Escalope', description: 'Peito de frango panado acompanhado de salada de repolho e batatas fritas', price: 8500, image: '../assets/images/menu-pratos.jpg' }
            ]}
        };
        
        // Initialize with default data if empty
        if (Object.keys(menuData).length === 0) {
            menuData = defaultMenuData;
            localStorage.setItem('sukaraMenuData', JSON.stringify(menuData));
        }
        
        // Tab navigation
        document.querySelectorAll('.admin-nav button[data-tab]').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.admin-nav button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                const tab = this.dataset.tab;
                document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
                document.getElementById(tab + 'Tab').classList.remove('hidden');
            });
        });
        
        function logout() {
            localStorage.removeItem('sukaraAdminLoggedIn');
            window.location.href = 'index.html';
        }
        
        function renderMenuEditor() {
            const container = document.getElementById('menuCategories');
            container.innerHTML = '';
            
            for (const [key, category] of Object.entries(menuData)) {
                const section = document.createElement('div');
                section.className = 'category-section';
                section.innerHTML = `
                    <div class="category-header">
                        <h4>${category.name}</h4>
                        <button class="btn-add" onclick="addItem('${key}')">
                            <i class="fas fa-plus"></i> Adicionar Item
                        </button>
                    </div>
                    <table class="items-table">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Descrição</th>
                                <th>Preço (Kz)</th>
                                <th>Popular</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-${key}">
                        </tbody>
                    </table>
                `;
                container.appendChild(section);
                
                renderCategoryItems(key, category.items);
            }
        }
        
        function renderCategoryItems(categoryKey, items) {
            const tbody = document.getElementById(`tbody-${categoryKey}`);
            if (!tbody) return;
            
            if (items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: var(--white-muted);">Nenhum item nesta categoria</td></tr>';
                return;
            }
            
            tbody.innerHTML = items.map((item, index) => `
                <tr data-index="${index}">
                    <td><input type="text" value="${item.name}" class="item-name" placeholder="Nome do prato"></td>
                    <td><input type="text" value="${item.description}" class="item-desc" placeholder="Descrição"></td>
                    <td><input type="number" value="${item.price}" class="item-price" placeholder="Preço" style="width: 100px;"></td>
                    <td style="text-align: center;">
                        <input type="checkbox" class="item-popular" ${item.popular ? 'checked' : ''}>
                    </td>
                    <td>
                        <button class="btn-save" onclick="saveItem('${categoryKey}', ${index})">
                            <i class="fas fa-save"></i>
                        </button>
                        <button class="btn-delete" onclick="deleteItem('${categoryKey}', ${index})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }
        
        function addItem(categoryKey) {
            if (!menuData[categoryKey].items) {
                menuData[categoryKey].items = [];
            }
            
            menuData[categoryKey].items.push({
                id: categoryKey + Date.now(),
                name: 'Novo Item',
                description: 'Descrição do item',
                price: 0,
                image: `../assets/images/menu-${categoryKey}.jpg`,
                popular: false
            });
            
            renderCategoryItems(categoryKey, menuData[categoryKey].items);
            updateStats();
            saveToLocalStorage();
        }
        
        function saveItem(categoryKey, index) {
            const row = document.querySelector(`#tbody-${categoryKey} tr[data-index="${index}"]`);
            
            menuData[categoryKey].items[index] = {
                ...menuData[categoryKey].items[index],
                name: row.querySelector('.item-name').value,
                description: row.querySelector('.item-desc').value,
                price: parseInt(row.querySelector('.item-price').value) || 0,
                popular: row.querySelector('.item-popular').checked
            };
            
            saveToLocalStorage();
            alert('Item guardado com sucesso!');
        }
        
        function deleteItem(categoryKey, index) {
            if (confirm('Tem certeza que deseja remover este item?')) {
                menuData[categoryKey].items.splice(index, 1);
                renderCategoryItems(categoryKey, menuData[categoryKey].items);
                updateStats();
                saveToLocalStorage();
            }
        }
        
        function saveAllChanges() {
            for (const [key, category] of Object.entries(menuData)) {
                const rows = document.querySelectorAll(`#tbody-${key} tr[data-index]`);
                rows.forEach((row, index) => {
                    if (category.items[index]) {
                        category.items[index] = {
                            ...category.items[index],
                            name: row.querySelector('.item-name').value,
                            description: row.querySelector('.item-desc').value,
                            price: parseInt(row.querySelector('.item-price').value) || 0,
                            popular: row.querySelector('.item-popular').checked
                        };
                    }
                });
            }
            
            saveToLocalStorage();
            alert('Todas as alterações foram guardadas!');
        }
        
        function saveToLocalStorage() {
            localStorage.setItem('sukaraMenuData', JSON.stringify(menuData));
        }
        
        function updateStats() {
            let totalItems = 0;
            let totalCategories = 0;
            let popularItems = 0;
            let totalPrice = 0;
            let priceCount = 0;
            
            for (const category of Object.values(menuData)) {
                if (category.items && category.items.length > 0) {
                    totalCategories++;
                    totalItems += category.items.length;
                    
                    category.items.forEach(item => {
                        if (item.popular) popularItems++;
                        totalPrice += item.price;
                        priceCount++;
                    });
                }
            }
            
            document.getElementById('totalItems').textContent = totalItems;
            document.getElementById('totalCategories').textContent = totalCategories;
            document.getElementById('popularItems').textContent = popularItems;
            document.getElementById('avgPrice').textContent = priceCount > 0 ? 
                Math.round(totalPrice / priceCount).toLocaleString() + ' Kz' : '0 Kz';
        }
        
        function saveInfo() {
            const info = {
                name: document.getElementById('restaurantName').value,
                slogan: document.getElementById('restaurantSlogan').value,
                address: document.getElementById('restaurantAddress').value,
                phone1: document.getElementById('restaurantPhone1').value,
                phone2: document.getElementById('restaurantPhone2').value,
                hours: document.getElementById('restaurantHours').value,
                email: document.getElementById('restaurantEmail').value,
                instagram: document.getElementById('restaurantInstagram').value,
                facebook: document.getElementById('restaurantFacebook').value
            };
            
            localStorage.setItem('sukaraRestaurantInfo', JSON.stringify(info));
            alert('Informações guardadas com sucesso!');
        }
        
        // Initialize
        renderMenuEditor();
        updateStats();
    </script>
</body>
</html>
